# .github/workflows/grc-gate.yml
name: grc-gate

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  id-token: write       # required for AWS OIDC + Cosign keyless
  contents: read
  pull-requests: write

env:
  AWS_REGION: us-east-1
  TF_WORKING_DIR: terraform

jobs:
  grc-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.6.6
          terraform_wrapper: false

      - name: Install Conftest
        if: always()
        run: |
          curl -fsSL https://github.com/open-policy-agent/conftest/releases/download/v0.50.0/conftest_0.50.0_Linux_x86_64.tar.gz \
            | tar -xz -C /usr/local/bin conftest

      - name: Install tfsec
        if: always()
        run: |
          curl -fsSL https://github.com/aquasecurity/tfsec/releases/download/v1.28.14/tfsec-linux-amd64 \
            -o /usr/local/bin/tfsec && chmod +x /usr/local/bin/tfsec

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      - name: Create evidence directory
        if: always()
        run: mkdir -p evidence

      - name: Terraform init and plan
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          terraform init -input=false
          terraform validate
          terraform plan -out=tfplan -no-color 2>&1 | tee ../evidence/plan.txt
          terraform show -json tfplan > plan.json

      - name: Conftest policy gate
        id: conftest
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          conftest test --policy ../policies --all-namespaces --output=json plan.json \
            > ../evidence/conftest-results.json || true
          python3 -c '
          import json, sys
          d = json.load(open("../evidence/conftest-results.json"))
          fails = sum(len(r.get("failures") or []) for r in d)
          print(f"conftest failures: {fails}")
          sys.exit(0 if fails == 0 else 1)
          '

      - name: Terraform apply
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform apply -auto-approve -input=false tfplan

      - name: tfsec scan
        id: tfsec
        if: always()
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          tfsec . --format sarif --out ../evidence/tfsec.sarif || true
          python3 -c '
          import json, sys
          d = json.load(open("../evidence/tfsec.sarif"))
          high = sum(
              1 for run in d.get("runs", [])
              for r in run.get("results", [])
              if (r.get("level") or "").lower() in ("warning", "error")
          )
          print(f"tfsec high+critical: {high}")
          '

      - name: Validate OSCAL component definition
        if: always()
        run: |
          mkdir -p evidence
          pip install --quiet compliance-trestle
          trestle validate -f oscal/components/acme-health-intake-api.json \
            | tee evidence/trestle-validate.txt

      - name: Bundle and sign evidence
        if: always()
        run: |
          cp ${{ env.TF_WORKING_DIR }}/plan.json evidence/plan.json || true
          BUNDLE="evidence-${{ github.run_id }}.tar.gz"
          tar -czf "$BUNDLE" evidence/
          sha256sum "$BUNDLE" > "${BUNDLE}.sha256"
          cosign sign-blob --yes \
            --bundle "${BUNDLE}.sig.bundle" \
            "$BUNDLE"

      - name: Upload evidence bundle to S3 vault
        if: always()
        run: |
          BUNDLE="evidence-${{ github.run_id }}.tar.gz"
          VAULT=$(terraform -chdir=${{ env.TF_WORKING_DIR }} output -raw evidence_vault_bucket 2>/dev/null || echo "${{ vars.EVIDENCE_VAULT }}")
          PREFIX="runs/${{ github.run_id }}"
          aws s3 cp "$BUNDLE"               "s3://${VAULT}/${PREFIX}/${BUNDLE}"
          aws s3 cp "${BUNDLE}.sha256"      "s3://${VAULT}/${PREFIX}/${BUNDLE}.sha256"
          aws s3 cp "${BUNDLE}.sig.bundle"  "s3://${VAULT}/${PREFIX}/${BUNDLE}.sig.bundle"
          echo "{ \"run_id\": \"${{ github.run_id }}\", \"repo\": \"${{ github.repository }}\", \"sha\": \"${{ github.sha }}\", \"bundle\": \"${BUNDLE}\" }" \
            > receipt.json
          aws s3 cp receipt.json "s3://${VAULT}/${PREFIX}/receipt.json"

      - name: Upload evidence artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: grc-evidence-${{ github.run_id }}
          path: evidence/
          retention-days: 90